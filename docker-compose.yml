services:
  db:
    image: postgres:17-alpine
    container_name: finance-tracker-db
    environment:
      POSTGRES_DB: finance_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - finance_tracker_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  finance_tracker_db:
